[tools]
bun = "latest"
markdownlint-cli2 = "latest"
pitchfork = "latest"

[tasks.lint]
run = ["bun lint:fix --unsafe", "mise lint:md"]

[tasks."lint:md"]
description = "Check markdown files for linting issues"
run = "markdownlint-cli2 '**/*.md'"

[tasks.update]
description = "Update bun dependencies and reinstall with isolated linker"
run = ["bun update", "bun i --linker=isolated", "mise deps"]

[tasks."db:env"]
description = "Generate .env file with default development values"
run = "bun run scripts/setup-env.ts"

[tasks."db:start"]
description = "Start PostgreSQL container for local development"
run = "bash scripts/db-start.sh"

[tasks."db:health"]
description = "Wait for PostgreSQL to be healthy"
run = "bash scripts/db-health.sh"

[tasks."db:stop"]
description = "Stop PostgreSQL container"
run = "docker stop blog-postgres"

[tasks."db:push"]
description = "Push Drizzle schema to database"
run = "bun drizzle-kit push"

[tasks."db:studio"]
description = "Open Drizzle Studio"
run = "bun drizzle-kit studio"

[tasks."db:setup"]
description = "Full local DB setup: generate .env, start PostgreSQL, health check, push schema"
depends = ["db:env", "db:start"]
run = ["mise run db:health", "mise run db:push"]

[deps.bun]
auto = true

[hooks]
enter = ["mise upgrade -q", "mise deps -q"]

[settings]
experimental = true
